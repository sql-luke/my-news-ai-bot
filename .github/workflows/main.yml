name: AI News Bot Daily Push

on:
  schedule:
    # UTC 時間 22:00 相當於台灣時間早上 06:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許在 Actions 頁面手動點擊按鈕測試

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 3.11 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安裝相依套件 (Requirements)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行 AI 新聞機器人腳本
      env:
        # 讀取 GitHub Secrets 並轉化為 Python 可用的環境變數
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      run: python news_bot.py
